<section class="portfolio" id="portfolio" *ngIf="cards().length > 0">
  <div class="portfolio_container">
    <h2 class="portfolio_title">Portfólio</h2>

    <div class="portfolio_grid">
      <div class="portfolio_item" *ngFor="let item of cards()">
        <img [src]="item.coverUrl" [alt]="item.categoryName" class="portfolio_img" />
        <span class="portfolio_label">{{ item.categoryName }}</span>
      </div>
    </div>
  </div>
</section>
