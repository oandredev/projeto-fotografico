<section class="about" id="about">
  <div class="about_container">
    <div class="about_photo-wrapper">
      <img class="about_photo" [src]="aboutImage()" />
    </div>
    <div class="about_content">
      <div class="about_heading">
        <h2 class="about_title">Sobre Mim</h2>
      </div>
      <p class="about_text">
        {{ aboutText() }}
      </p>
    </div>
  </div>
</section>
