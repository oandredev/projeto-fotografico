<div class="messages-container">
  <header class="top-header">
    <h1>MENSAGENS</h1>

    <div class="filters">
      <div class="filter-buttons">
        <button [class.active]="currentFilter() === 'inbox'" (click)="setFilter('inbox')">
          Caixa de Entrada
        </button>
        <button [class.active]="currentFilter() === 'starred'" (click)="setFilter('starred')">
          Marcadas
        </button>
        <button [class.active]="currentFilter() === 'archived'" (click)="setFilter('archived')">
          Arquivadas
        </button>
        <button [class.active]="currentFilter() === 'all'" (click)="setFilter('all')">Todas</button>
      </div>

      <input
        type="text"
        placeholder="Pesquisar..."
        [ngModel]="search()"
        (ngModelChange)="onSearch($event)"
      />
    </div>
  </header>

  <section class="messages-list">
    <article class="message-card" *ngFor="let message of messages()">
      <div class="avatar">
        <span>#{{ message.id }}</span>
      </div>

      <div class="content">
        <div class="top-line">
          <h2>{{ message.name }}</h2>

          <span class="phone">
            {{ message.phone }}
          </span>
          <span class="email">
            {{ message.email }}
          </span>
        </div>

        <p class="subject">
          {{ message.subject }}
        </p>

        <p class="body">
          {{ message.body }}
        </p>
      </div>

      <div class="actions">
        <span class="date">
          {{ message.date | date: "dd/MM/yyyy 'às' HH:mm" }}
        </span>

        <div class="btn-group">
          <button (click)="toggleStar(message)">
            <span class="material-icons yellow" [class.is-starred]="message.isStarred">
              {{ message.isStarred ? 'star' : 'star_border' }}
            </span>
          </button>

          <button (click)="toggleArchive(message)">
            <span
              class="material-icons"
              [class.gray]="!message.isArchived"
              [class.orange]="message.isArchived"
            >
              {{ message.isArchived ? 'unarchive' : 'archive' }}
            </span>
          </button>
        </div>
      </div>
    </article>

    <div class="empty-state" *ngIf="!loading() && messages().length === 0">
      <span class="material-icons icon purple"> search_off </span>

      <p>Nenhuma mensagem encontrada.</p>

      <button
        class="empty-state-btn"
        *ngIf="search() || currentFilter() !== 'all'"
        (click)="clearFilters()"
      >
        Limpar filtros
      </button>
    </div>
  </section>

  <footer class="pagination-footer">
    <div class="pagination" *ngIf="currentPage() > 1 || hasNextPage()">
      <button class="nav-btn" (click)="previousPage()" [disabled]="currentPage() === 1">←</button>

      <span class="page-indicator"> Página {{ currentPage() }} de {{ totalPages() }} </span>

      <button class="nav-btn" (click)="nextPage()" [disabled]="!hasNextPage()">→</button>
    </div>
  </footer>
</div>
