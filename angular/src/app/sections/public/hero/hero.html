<section class="hero" id="hero">
  <div class="hero_container">
    <div class="hero_content">
      <div class="hero_logo">
        <img src="logo.png" alt="Larissa Calegaro | Photo & Video" />
      </div>
      <p class="hero_tagline" [innerHTML]="slogan()"></p>
    </div>

    <div class="carousel" *ngIf="imageUrls().length">
      <div class="group">
        <div class="card" *ngFor="let url of imageUrls()">
          <img [src]="API_URL + url" alt="carrossel" />
        </div>
      </div>
      <div class="group" aria-hidden="true">
        <div class="card" *ngFor="let url of imageUrls()">
          <img [src]="API_URL + url" alt="carrossel" />
        </div>
      </div>
      <div class="group" aria-hidden="true">
        <div class="card" *ngFor="let url of imageUrls()">
          <img [src]="API_URL + url" alt="carrossel" />
        </div>
      </div>
      <div class="group" aria-hidden="true">
        <div class="card" *ngFor="let url of imageUrls()">
          <img [src]="API_URL + url" alt="carrossel" />
        </div>
      </div>
      <div class="group" aria-hidden="true">
        <div class="card" *ngFor="let url of imageUrls()">
          <img [src]="API_URL + url" alt="carrossel" />
        </div>
      </div>
      <div class="group" aria-hidden="true">
        <div class="card" *ngFor="let url of imageUrls()">
          <img [src]="API_URL + url" alt="carrossel" />
        </div>
      </div>
    </div>
  </div>
</section>
